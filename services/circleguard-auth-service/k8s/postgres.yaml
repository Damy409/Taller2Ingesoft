apiVersion: apps/v1
kind: Deployment
metadata:
  name: circleguard-auth-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: circleguard-auth-postgres
  template:
    metadata:
      labels:
        app: circleguard-auth-postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: "circleguard_auth"
        - name: POSTGRES_USER
          value: "admin"
        - name: POSTGRES_PASSWORD
          value: "password"
---
apiVersion: v1
kind: Service
metadata:
  name: circleguard-auth-postgres
spec:
  selector:
    app: circleguard-auth-postgres
  ports:
  - port: 5432
    targetPort: 5432
  type: ClusterIP
